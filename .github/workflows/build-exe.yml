name: Build EXE with PyInstaller

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        # 安装 yaml 依赖（app.py 中使用）
        pip install pyyaml
    
    - name: Create PyInstaller spec file
      run: |
        echo "# -*- mode: python ; coding: utf-8 -*-

block_cipher = None


a = Analysis(['app.py'],
             pathex=['.'],
             binaries=[],
             datas=[
                 ('templates', 'templates'),
                 ('static', 'static'),
                 ('config.example.json', '.'),
                 ('logging.yaml', '.'),
                 ('README.md', '.')
             ],
             hiddenimports=[
                 'yaml',
                 'flask_wtf',
                 'flask_wtf.csrf'
             ],
             hookspath=[],
             runtime_hooks=[],
             excludes=[],
             win_no_prefer_redirects=False,
             win_private_assemblies=False,
             cipher=block_cipher,
             noarchive=False)

pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

exe = EXE(pyz,
          a.scripts,
          [],
          exclude_binaries=True,
          name='monitor_optimization_tool',
          debug=False,
          bootloader_ignore_signals=False,
          strip=False,
          upx=True,
          console=True,
          disable_windowed_traceback=False,
          target_arch=None,
          codesign_identity=None,
          entitlements_file=None)

coll = COLLECT(exe,
               a.binaries,
               a.zipfiles,
               a.datas,
               strip=False,
               upx=True,
               upx_exclude=[],
               name='monitor_optimization_tool')" > monitor_optimization_tool.spec
    
    - name: Build with PyInstaller
      run: pyinstaller monitor_optimization_tool.spec
    
    - name: Create release directory
      run: mkdir -p release
    
    - name: Copy built files to release
      run: |
        Copy-Item -Path "dist/monitor_optimization_tool" -Destination "release/" -Recurse
    
    - name: Create version file
      run: |
        $version = Get-Date -Format "yyyyMMdd-HHmmss"
        "Version: $version" | Out-File -FilePath "release/version.txt" -Encoding ASCII
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: monitor-optimization-tool-exe
        path: release/
        retention-days: 30

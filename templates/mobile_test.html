{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
  <!-- 页面标题 -->
  <div class="row mb-3">
    <div class="col-12">
      <div class="card shadow-sm border-primary">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="bi bi-phone me-2"></i>移动端测试页面
          </h5>
        </div>
        <div class="card-body">
          <p class="mb-0">此页面用于测试移动设备显示效果和诊断问题</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 设备信息 -->
  <div class="row mb-3">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0">
            <i class="bi bi-info-circle me-2"></i>设备信息
          </h6>
        </div>
        <div class="card-body">
          <div class="row g-2">
            <div class="col-6 col-md-3">
              <div class="card bg-light">
                <div class="card-body text-center p-2">
                  <small class="text-muted d-block">屏幕宽度</small>
                  <strong id="screenWidth">-</strong>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card bg-light">
                <div class="card-body text-center p-2">
                  <small class="text-muted d-block">屏幕高度</small>
                  <strong id="screenHeight">-</strong>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card bg-light">
                <div class="card-body text-center p-2">
                  <small class="text-muted d-block">设备类型</small>
                  <strong id="deviceType">-</strong>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card bg-light">
                <div class="card-body text-center p-2">
                  <small class="text-muted d-block">方向</small>
                  <strong id="orientation">-</strong>
                </div>
              </div>
            </div>
          </div>
          
          <div class="mt-3">
            <small class="text-muted">
              <strong>User Agent:</strong><br>
              <span id="userAgent" style="word-break: break-all;">-</span>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 功能测试 -->
  <div class="row mb-3">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0">
            <i class="bi bi-check-circle me-2"></i>功能测试
          </h6>
        </div>
        <div class="card-body">
          <div class="list-group">
            <div class="list-group-item">
              <div class="d-flex justify-content-between align-items-center">
                <span>Bootstrap JS</span>
                <span id="bootstrapStatus" class="badge bg-secondary">检测中...</span>
              </div>
            </div>
            <div class="list-group-item">
              <div class="d-flex justify-content-between align-items-center">
                <span>导航栏折叠</span>
                <span id="navbarStatus" class="badge bg-secondary">检测中...</span>
              </div>
            </div>
            <div class="list-group-item">
              <div class="d-flex justify-content-between align-items-center">
                <span>触摸支持</span>
                <span id="touchStatus" class="badge bg-secondary">检测中...</span>
              </div>
            </div>
            <div class="list-group-item">
              <div class="d-flex justify-content-between align-items-center">
                <span>CSS加载</span>
                <span id="cssStatus" class="badge bg-secondary">检测中...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 测试元素 -->
  <div class="row mb-3">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0">
            <i class="bi bi-ui-checks me-2"></i>UI元素测试
          </h6>
        </div>
        <div class="card-body">
          <!-- 按钮测试 -->
          <div class="mb-3">
            <label class="form-label"><strong>按钮测试</strong></label>
            <div class="d-grid gap-2">
              <button class="btn btn-primary" onclick="alert('按钮点击成功！')">
                <i class="bi bi-hand-index me-2"></i>点击测试
              </button>
              <button class="btn btn-success">
                <i class="bi bi-check-circle me-2"></i>成功按钮
              </button>
              <button class="btn btn-warning">
                <i class="bi bi-exclamation-triangle me-2"></i>警告按钮
              </button>
            </div>
          </div>

          <!-- 表单测试 -->
          <div class="mb-3">
            <label class="form-label"><strong>表单测试</strong></label>
            <input type="text" class="form-control mb-2" placeholder="文本输入">
            <input type="date" class="form-control mb-2">
            <select class="form-select mb-2">
              <option>选项 1</option>
              <option>选项 2</option>
              <option>选项 3</option>
            </select>
          </div>

          <!-- 卡片测试 -->
          <div class="mb-3">
            <label class="form-label"><strong>卡片测试</strong></label>
            <div class="row g-2">
              <div class="col-6">
                <div class="card bg-primary text-white">
                  <div class="card-body text-center p-2">
                    <h4 class="mb-0">100</h4>
                    <small>数据1</small>
                  </div>
                </div>
              </div>
              <div class="col-6">
                <div class="card bg-success text-white">
                  <div class="card-body text-center p-2">
                    <h4 class="mb-0">200</h4>
                    <small>数据2</small>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 诊断建议 -->
  <div class="row mb-3">
    <div class="col-12">
      <div class="card shadow-sm border-info">
        <div class="card-header bg-info text-white">
          <h6 class="mb-0">
            <i class="bi bi-lightbulb me-2"></i>诊断建议
          </h6>
        </div>
        <div class="card-body">
          <div id="diagnostics">
            <p class="mb-2"><strong>正在检测...</strong></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// 更新设备信息
function updateDeviceInfo() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  
  document.getElementById('screenWidth').textContent = width + 'px';
  document.getElementById('screenHeight').textContent = height + 'px';
  document.getElementById('userAgent').textContent = navigator.userAgent;
  
  // 判断设备类型
  let deviceType = '';
  if (width < 576) {
    deviceType = '超小屏';
  } else if (width < 768) {
    deviceType = '小屏';
  } else if (width < 992) {
    deviceType = '中屏';
  } else {
    deviceType = '大屏';
  }
  document.getElementById('deviceType').textContent = deviceType;
  
  // 判断方向
  const orientation = width > height ? '横屏' : '竖屏';
  document.getElementById('orientation').textContent = orientation;
}

// 检测功能
function checkFeatures() {
  const diagnostics = [];
  
  // 检测Bootstrap
  if (typeof bootstrap !== 'undefined') {
    document.getElementById('bootstrapStatus').textContent = '✓ 正常';
    document.getElementById('bootstrapStatus').className = 'badge bg-success';
  } else {
    document.getElementById('bootstrapStatus').textContent = '✗ 未加载';
    document.getElementById('bootstrapStatus').className = 'badge bg-danger';
    diagnostics.push('⚠️ Bootstrap JS未加载，导航栏折叠功能可能无法使用');
  }
  
  // 检测导航栏
  const navbar = document.querySelector('.navbar-collapse');
  if (navbar) {
    document.getElementById('navbarStatus').textContent = '✓ 存在';
    document.getElementById('navbarStatus').className = 'badge bg-success';
  } else {
    document.getElementById('navbarStatus').textContent = '✗ 未找到';
    document.getElementById('navbarStatus').className = 'badge bg-danger';
    diagnostics.push('⚠️ 导航栏元素未找到');
  }
  
  // 检测触摸支持
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('touchStatus').textContent = '✓ 支持';
    document.getElementById('touchStatus').className = 'badge bg-success';
  } else {
    document.getElementById('touchStatus').textContent = '✗ 不支持';
    document.getElementById('touchStatus').className = 'badge bg-warning';
  }
  
  // 检测CSS
  const testElement = document.createElement('div');
  testElement.style.display = 'flex';
  if (testElement.style.display === 'flex') {
    document.getElementById('cssStatus').textContent = '✓ 正常';
    document.getElementById('cssStatus').className = 'badge bg-success';
  } else {
    document.getElementById('cssStatus').textContent = '✗ 异常';
    document.getElementById('cssStatus').className = 'badge bg-danger';
    diagnostics.push('⚠️ CSS可能未正确加载');
  }
  
  // 显示诊断结果
  const diagnosticsDiv = document.getElementById('diagnostics');
  if (diagnostics.length === 0) {
    diagnosticsDiv.innerHTML = '<p class="text-success mb-0"><i class="bi bi-check-circle me-2"></i><strong>所有功能正常！</strong></p>';
  } else {
    let html = '<p class="mb-2"><strong>发现以下问题：</strong></p><ul class="mb-0">';
    diagnostics.forEach(d => {
      html += '<li>' + d + '</li>';
    });
    html += '</ul>';
    html += '<hr><p class="mb-0"><strong>解决方法：</strong></p>';
    html += '<ol class="mb-0">';
    html += '<li>清除浏览器缓存（Ctrl+Shift+Delete）</li>';
    html += '<li>刷新页面（F5或下拉刷新）</li>';
    html += '<li>检查网络连接</li>';
    html += '<li>尝试其他浏览器</li>';
    html += '</ol>';
    diagnosticsDiv.innerHTML = html;
  }
}

// 页面加载时执行
updateDeviceInfo();
setTimeout(checkFeatures, 500);

// 窗口大小改变时更新
window.addEventListener('resize', updateDeviceInfo);
window.addEventListener('orientationchange', function() {
  setTimeout(updateDeviceInfo, 100);
});
</script>
{% endblock %}
